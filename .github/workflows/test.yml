name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22", "24"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Dist module-graph smoke
        run: |
          # Each entry bundle inlines its own copy of the core module
          # (splitting: false), so freezeTuning must reach engines across
          # bundle copies (integrations, web, edge, ESM<->CJS). The src test
          # suite runs in one module graph and cannot catch regressions here.
          pnpm smoke:dist

      - name: Validate package metadata
        run: pnpm publint

      - name: Validate published types
        run: pnpm attw
        continue-on-error: true

      - name: Pack (smoke)
        run: pnpm pack --pack-destination /tmp

      - name: CLI smoke (--help must exit 0)
        run: |
          # Exercise the published CLI shape: `noeticos help` must exit 0 without
          # touching any LLM provider. Catches missing-file / broken-shebang
          # regressions before they reach consumers via `npx @takk/noeticos`.
          node dist/cli/index.js help | grep -q "noeticos"
          node dist/cli/index.js version | grep -q "1.0.0"

      - name: Upload coverage (Node 22 only)
        if: matrix.node == '22'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
